workflows:
  ios-release:
    name: iOS Release (App Store)
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - ios_signing
      vars:
        BUNDLE_ID: com.wko.dropshare
        XCODE_WORKSPACE: ios/Runner.xcworkspace
        XCODE_SCHEME: Runner
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Set up keychain
        script: keychain initialize

      - name: Import certificate
        script: |
          echo "$CM_CERTIFICATE" | base64 --decode > /tmp/cert.p12
          keychain add-certificates --certificate /tmp/cert.p12 --certificate-password "$CM_CERTIFICATE_PASSWORD"
          echo "--- Installed certificates ---"
          security find-identity -v -p codesigning

      - name: Set up provisioning profile
        script: |
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_HOME"
          echo "Creating provisioning profile directory..."
          ls -la "$PROFILES_HOME"
          echo "$CM_PROVISIONING_PROFILE" | base64 --decode > "$PROFILES_HOME/profile.mobileprovision"
          echo "Provisioning profile created"
          ls -la "$PROFILES_HOME/profile.mobileprovision"

      - name: Flutter pub get
        script: flutter pub get

      - name: Generate launcher icons
        script: dart run flutter_launcher_icons || true

      - name: Build iOS IPA
        script: |
          PROFILE="$HOME/Library/MobileDevice/Provisioning Profiles/profile.mobileprovision"

          echo "=== Debug Info ==="
          echo "Profile path: $PROFILE"
          echo "Profile exists: $(test -f "$PROFILE" && echo 'YES' || echo 'NO')"

          if [ ! -f "$PROFILE" ]; then
            echo "ERROR: Provisioning profile not found at $PROFILE"
            exit 1
          fi

          echo "Extracting UUID from profile..."
          UUID=$(security cms -D -i "$PROFILE" 2>/dev/null | plutil -extract UUID raw - 2>/dev/null)

          if [ -z "$UUID" ]; then
            echo "WARNING: Could not extract UUID from provisioning profile"
            echo "Using auto-signing instead..."
            flutter build ipa --release --no-codesign
          else
            echo "Profile UUID: $UUID"

            cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>ZVJ5H9S337</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.wko.dropshare</key>
              <string>$UUID</string>
            </dict>
          </dict>
          </plist>
          EOF

            flutter build ipa \
              --release \
              --export-options-plist=/tmp/ExportOptions.plist
          fi

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
